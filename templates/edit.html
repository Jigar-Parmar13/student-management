<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Edit Student</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0d0f14; --surface:#161920; --border:#252830; --accent:#f0c040; --text:#e8eaf0; --muted:#7a7f90; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:2rem; width:100%; max-width:460px; }
    h2 { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; margin-bottom:1.5rem; }
    h2 span { color:var(--accent); }
    .form-group { margin-bottom:1rem; }
    label { display:block; font-size:0.72rem; color:var(--muted); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.5px; }
    input, select { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:0.65rem 0.9rem; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
    input:focus, select:focus { border-color:var(--accent); }
    select option { background:var(--surface); }
    .actions { display:flex; gap:0.75rem; margin-top:1.5rem; }
    .btn { padding:0.65rem 1.4rem; border:none; border-radius:8px; font-family:'Syne',sans-serif; font-weight:600; font-size:0.85rem; cursor:pointer; text-decoration:none; display:inline-block; transition:opacity 0.2s; }
    .btn-primary { background:var(--accent); color:#000; }
    .btn-secondary { background:transparent; border:1px solid var(--border); color:var(--muted); }
    .btn:hover { opacity:0.85; }
  </style>
</head>
<body>
<div class="card">
  <h2>Edit <span>Student</span></h2>
  <form action="/edit/{{ student.id }}" method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" value="{{ student.name }}" required/>
    </div>
    <div class="form-group">
      <label>Age</label>
      <input type="number" name="age" value="{{ student.age }}" min="10" max="60" required/>
    </div>
    <div class="form-group">
      <label>Course</label>
      <input type="text" name="course" value="{{ student.course }}" required/>
    </div>
    <div class="form-group">
      <label>Grade</label>
      <select name="grade" required>
        {% for g in ['A','A-','B+','B','B-','C+','C','F'] %}
        <option value="{{ g }}" {% if student.grade == g %}selected{% endif %}>{{ g }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="actions">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
</body>
</html>
